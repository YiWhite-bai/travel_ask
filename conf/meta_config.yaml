        description: 退款申请时间。
        alias: [申请时间, 退款申请时间]
        sync: false

      - name: processed_at
        role: dimension
        description: 退款处理时间。
        alias: [处理时间, 审核时间]
        sync: false

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: refund_records
    role: fact
    description: 退款记录表，存储退款申请审核通过后的实际打款记录，包含退款金额和退款状态。
    columns:
      - name: id
        role: primary_key
        description: 退款记录主键ID。
        alias: [退款记录ID]
        sync: false

      - name: refund_no
        role: dimension
        description: 退款流水号，业务唯一标识。
        alias: [退款流水号, 退款单号, 退款编号]
        sync: false

      - name: refund_request_id
        role: foreign_key
        description: 退款申请ID，关联refund_requests.id。
        alias: [退款申请ID]
        sync: false

      - name: order_id
        role: foreign_key
        description: 关联订单ID，关联orders.id。
        alias: [订单ID]
        sync: false

      - name: order_item_id
        role: foreign_key
        description: 关联订单明细ID，关联order_items.id。
        alias: [订单明细ID]
        sync: false

      - name: user_id
        role: foreign_key
        description: 退款用户ID，关联users.id。
        alias: [用户ID]
        sync: false

      - name: payment_id
        role: foreign_key
        description: 支付记录ID，关联payments.id。
        alias: [支付记录ID]
        sync: false

      - name: currency_code
        role: foreign_key
        description: 货币编码，关联currencies.currency_code。
        alias: [币种, 货币]
        sync: false

      - name: amount
        role: measure
        description: 退款金额。
        alias: [退款金额, 退款额]
        sync: false

      - name: status_code
        role: dimension
        description: 退款状态，pending=退款处理中，success=退款成功，failed=退款失败。
        alias: [退款状态]
        sync: true

      - name: processed_at
        role: dimension
        description: 退款完成时间。
        alias: [退款完成时间, 退款到账时间, 处理时间]
        sync: false

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


# ==========================================================
# 业务指标定义
# ==========================================================

metrics:
  - name: 订单量
    description: 订单总数量，统计所有已创建的订单数，可按订单状态（待支付/已支付/已取消/已完成）、订单类型（酒店/景点/机票/火车票/汽车票/接送）、时间范围和地区等维度筛选。
    relevant_columns:
      - orders.id
      - orders.order_type_code
      - orders.status_code
      - orders.created_at
    alias: [订单数, 订单总量, 下单量, 订单总数]

  - name: 销售总额
    description: 所有已完成订单的应付金额总和，即用户实际需要支付的金额（商品总金额减去营销优惠、优惠券优惠和积分抵扣）。仅统计状态为finished的订单。
    relevant_columns:
      - orders.payable_amount
      - orders.status_code
      - orders.paid_at
    alias: [销售额, 收入, 总营收, 交易额, GMV]

  - name: 退款总额
    description: 所有退款成功的退款记录金额总和，反映售后退款规模。仅统计status_code=success的退款记录。
    relevant_columns:
      - refund_records.amount
      - refund_records.status_code
    alias: [退款额, 退款总金额, 退单金额]

  - name: 优惠总额
    description: 所有订单的优惠金额总和，包括营销优惠金额、优惠券优惠金额和积分抵扣金额。
    relevant_columns:
      - orders.marketing_discount_amount
      - orders.coupon_discount_amount
      - orders.point_discount_amount
    alias: [优惠金额, 折扣总额, 减免金额]

  - name: 平均客单价
    description: 平均每单支付金额（AOV），等于销售总额除以已完成订单数。仅统计状态为finished的订单。
    relevant_columns:
      - orders.payable_amount
      - orders.id
      - orders.status_code
    alias: [客单价, AOV, 平均订单金额, 人均消费]

  - name: 退款率
    description: 退款订单数占总订单数的比例。分子为发生过退款的订单数（refunded_amount>0且status_code=finished），分母为所有finished订单数。
    relevant_columns:
      - orders.id
      - orders.refunded_amount
      - orders.status_code
    alias: [退款比例, 退单率, 退款订单占比]

  - name: 核销率
    description: 已使用优惠券数占已领取优惠券总数的比例。分子为status_code=used的用户券数，分母为所有用户券数。
    relevant_columns:
      - user_coupons.id
      - user_coupons.status_code
    alias: [用券率, 优惠券使用率, 券核销率]

  - name: 会员转化率
    description: VIP用户（含silver和gold）占总用户数的比例。仅统计status_code=normal或vip的活跃用户。
    relevant_columns:
      - member_accounts.member_level_code
      - users.status_code
    alias: [VIP占比, 会员占比, 高级会员率]

  - name: 平均入住晚数
    description: 酒店订单的平均入住天数。通过order_items中product_type_code=hotel_room的travel_end_time与travel_time之差计算。
    relevant_columns:
      - order_items.product_type_code
      - order_items.travel_time
      - order_items.travel_end_time
    alias: [平均住宿天数, 平均入住天数, 平均住宿晚数]

  - name: 库存占用率
    description: 已售库存占总库存的比例，用于衡量各类商品库存利用效率。按商品类型分别统计。
    relevant_columns:
      - hotel_room_daily.total_inventory
      - hotel_room_daily.sold_inventory
      - scenic_ticket_daily.total_inventory
      - scenic_ticket_daily.sold_inventory
      - flight_cabin_inventory.total_inventory
      - flight_cabin_inventory.sold_inventory
    alias: [库存利用率, 售罄率, 库存售出比]
