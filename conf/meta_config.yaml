# ============================================================
# 旅游平台元数据知识库配置
# ============================================================

tables:

  # ==========================================================
  # 基础维度
  # ==========================================================

  - name: areas
    role: dim
    description: 地区维表，维护省、市、区县三级行政区域，用于按地区维度筛选和分组统计数据。
    columns:
      - name: id
        role: primary_key
        description: 地区主键ID。
        alias: [地区ID]
        sync: false

      - name: area_code
        role: dimension
        description: 地区编码，业务唯一标识。
        alias: [地区编码, 区域编码]
        sync: false

      - name: area_name
        role: dimension
        description: 地区名称，如广东省、深圳市等。
        alias: [地区名称, 地区, 区域, 城市, 目的地, 所在城市, 省份]
        sync: true

      - name: area_full_name
        role: dimension
        description: 地区全称，完整行政区名称路径，如"广东省/深圳市/南山区"。用于模糊匹配所有下级地区，如 area_full_name LIKE '北京市%' 可匹配北京市及所有区县。
        alias: [地区全称, 完整地址, 行政区全称, 地区路径]
        sync: true

      - name: parent_id
        role: foreign_key
        description: 父级地区ID，自关联areas.id。level=1时为空，level>1时不为空。
        alias: [上级地区ID, 父级地区]
        sync: false

      - name: level
        role: dimension
        description: 地区层级，1=省级，2=地市级，3=区县级。
        alias: [地区层级, 层级, 行政区级别]
        sync: false

      - name: postal_code
        role: dimension
        description: 邮政编码。
        alias: [邮编, 邮政编码, 邮政编号]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [地区状态, 状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [地区创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [地区更新时间]
        sync: false


  - name: currencies
    role: dim
    description: 币种维表，维护金额展示与结算使用的币种信息，如人民币、美元等。
    columns:
      - name: id
        role: primary_key
        description: 币种主键ID。
        alias: [币种ID]
        sync: false

      - name: currency_code
        role: dimension
        description: 币种代码，如CNY、USD。
        alias: [币种编码, 货币代码, 币种]
        sync: true

      - name: currency_name
        role: dimension
        description: 币种名称，如人民币、美元。
        alias: [币种名称, 货币名称]
        sync: true

      - name: symbol
        role: dimension
        description: 币种符号，如¥、$。
        alias: [货币符号, 币种符号]
        sync: true

      - name: precision_scale
        role: dimension
        description: 金额精度位数。
        alias: [精度, 小数位数]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [币种状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: channels
    role: dim
    description: 渠道维表，定义App、Web、小程序、H5等下单渠道，用于按渠道维度分析订单来源。
    columns:
      - name: id
        role: primary_key
        description: 渠道主键ID。
        alias: [渠道ID]
        sync: false

      - name: channel_code
        role: dimension
        description: 渠道编码，如app、web、miniapp、h5。
        alias: [渠道编码]
        sync: false

      - name: channel_name
        role: dimension
        description: 渠道名称，如App、Web站、小程序、H5页。
        alias: [渠道名称, 渠道, 来源渠道, 下单渠道]
        sync: true

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [渠道状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: transport_hubs
    role: dim
    description: 交通枢纽维表，维护机场、火车站、汽车站等交通枢纽信息，用于交通线路的出发到达站点关联。
    columns:
      - name: id
        role: primary_key
        description: 交通枢纽主键ID。
        alias: [枢纽ID]
        sync: false

      - name: hub_code
        role: dimension
        description: 枢纽编码，业务唯一标识。
        alias: [枢纽编码]
        sync: false

      - name: hub_name
        role: dimension
        description: 枢纽名称，如"上海虹桥国际机场"、"北京南站"。
        alias: [枢纽名称, 站点名称, 站点, 机场名, 火车站名]
        sync: true

      - name: hub_type_code
        role: dimension
        description: 枢纽类型，airport=机场，railway_station=火车站，bus_station=汽车站。
        alias: [枢纽类型, 站点类型, 交通枢纽类型]
        sync: true

      - name: city_area_id
        role: foreign_key
        description: 所属城市地区ID，关联areas.id（城市级）。
        alias: [所在城市ID, 枢纽城市]
        sync: false

      - name: address
        role: dimension
        description: 枢纽地址。
        alias: [枢纽地址, 站点地址]
        sync: false

      - name: latitude
        role: dimension
        description: 纬度。
        alias: [纬度, 纬度坐标]
        sync: false

      - name: longitude
        role: dimension
        description: 经度。
        alias: [经度, 经度坐标]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [枢纽状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: suppliers
    role: dim
    description: 供应商主表，存储酒店、景点、交通等供给方主体信息，用于按供应商维度统计订单和收入。
    columns:
      - name: id
        role: primary_key
        description: 供应商主键ID。
        alias: [供应商ID]
        sync: false

      - name: supplier_code
        role: dimension
        description: 供应商编码，业务唯一标识。
        alias: [供应商编码]
        sync: false

      - name: supplier_name
        role: dimension
        description: 供应商名称。
        alias: [供应商名称, 供应商, 供给方]
        sync: true

      - name: supplier_type_code
        role: dimension
        description: 供应商类型，hotel=酒店，scenic=景点，flight=机票，train=火车票，bus=汽车票，transfer=接送。
        alias: [供应商类型, 供给类型]
        sync: true

      - name: area_id
        role: foreign_key
        description: 所属地区ID，关联areas.id。
        alias: [供应商地区ID, 所属地区]
        sync: false

      - name: contact_name
        role: dimension
        description: 联系人姓名。
        alias: [联系人, 联系人姓名]
        sync: false

      - name: contact_phone
        role: dimension
        description: 联系人电话。
        alias: [联系电话, 联系人电话]
        sync: false

      - name: contact_email
        role: dimension
        description: 联系人邮箱。
        alias: [联系邮箱]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [供应商状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  # ==========================================================
  # 用户域
  # ==========================================================

  - name: users
    role: dim
    description: 用户主表，存储用户基础信息，用于按用户维度和注册地区维度分析。
    columns:
      - name: id
        role: primary_key
        description: 用户主键ID。
        alias: [用户ID, 会员ID]
        sync: false

      - name: nickname
        role: dimension
        description: 用户昵称。
        alias: [昵称, 用户名]
        sync: true

      - name: avatar_url
        role: dimension
        description: 头像地址。
        alias: [头像, 头像URL]
        sync: false

      - name: phone
        role: dimension
        description: 手机号。
        alias: [手机号, 电话, 联系方式]
        sync: false

      - name: email
        role: dimension
        description: 邮箱。
        alias: [邮箱, 电子邮件, Email]
        sync: false

      - name: gender_code
        role: dimension
        description: 性别，male=男，female=女，unknown=未知。
        alias: [性别]
        sync: true

      - name: birth_date
        role: dimension
        description: 出生日期。
        alias: [出生日期, 生日]
        sync: false

      - name: register_area_id
        role: foreign_key
        description: 注册地区ID，关联areas.id（城市级）。
        alias: [注册地区ID, 注册城市ID]
        sync: false

      - name: status_code
        role: dimension
        description: 用户状态，normal=正常，vip=VIP用户，inactive=已停用。
        alias: [用户状态, 账号状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间（注册时间）。
        alias: [注册时间, 创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: user_profiles
    role: dim
    description: 用户实名资料表，与users一对一，存储真实姓名、证件号、职业、偏好等扩展信息。
    columns:
      - name: id
        role: primary_key
        description: 资料主键ID。
        alias: [资料ID]
        sync: false

      - name: user_id
        role: foreign_key
        description: 用户ID，关联users.id。
        alias: [用户ID]
        sync: false

      - name: real_name
        role: dimension
        description: 真实姓名。
        alias: [真实姓名, 姓名, 实名]
        sync: false

      - name: identity_no
        role: dimension
        description: 证件号码。
        alias: [证件号, 身份证号, 护照号]
        sync: false

      - name: identity_type_code
        role: dimension
        description: 证件类型，id_card=居民身份证，passport=护照。
        alias: [证件类型]
        sync: true

      - name: residence_city_name
        role: dimension
        description: 居住地全名，完整行政区名称，如"上海市/浦东新区"。
        alias: [居住地, 居住城市, 所在地]
        sync: true

      - name: occupation
        role: dimension
        description: 职业。
        alias: [职业, 工作, 行业]
        sync: true

      - name: preference_payload
        role: dimension
        description: 偏好配置，JSON格式存储用户偏好标签。
        alias: [偏好, 用户偏好, 偏好设置]
        sync: false

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: travelers
    role: dim
    description: 常用出行人表，维护用户可复用的真实出行人资料（乘机人、入住人、游客等），一个用户可有多名出行人。
    columns:
      - name: id
        role: primary_key
        description: 出行人主键ID。
        alias: [出行人ID]
        sync: false

      - name: user_id
        role: foreign_key
        description: 所属用户ID，关联users.id。
        alias: [用户ID, 所属用户]
        sync: false

      - name: traveler_name
        role: dimension
        description: 出行人姓名。
        alias: [出行人姓名, 旅客姓名, 乘机人, 入住人]
        sync: true

      - name: identity_no
        role: dimension
        description: 证件号码。
        alias: [证件号, 身份证号]
        sync: false

      - name: identity_type_code
        role: dimension
        description: 证件类型，id_card=居民身份证，passport=护照。
        alias: [证件类型]
        sync: true

      - name: gender_code
        role: dimension
        description: 性别，male=男，female=女。
        alias: [性别]
        sync: true

      - name: birth_date
        role: dimension
        description: 出生日期。
        alias: [出生日期, 生日]
        sync: false

      - name: phone
        role: dimension
        description: 联系手机号。
        alias: [手机号, 联系电话]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [出行人状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: member_accounts
    role: dim
    description: 会员账户表，与users一对一，存储会员等级、积分余额、成长值等信息。
    columns:
      - name: id
        role: primary_key
        description: 会员账户主键ID。
        alias: [会员账户ID]
        sync: false

      - name: user_id
        role: foreign_key
        description: 用户ID，关联users.id。
        alias: [用户ID, 会员用户ID]
        sync: false

      - name: member_level_code
        role: dimension
        description: 会员等级，normal=普通会员（growth_value<5000），silver=银卡会员（5000-12000），gold=金卡会员（>=12000）。
        alias: [会员等级, 会员级别, VIP等级]
        sync: true

      - name: points_balance
        role: measure
        description: 当前积分余额。
        alias: [积分余额, 当前积分, 可用积分]
        sync: false

      - name: total_points
        role: measure
        description: 累计获得积分总量。
        alias: [累计积分, 总积分, 历史总积分]
        sync: false

      - name: growth_value
        role: measure
        description: 成长值，决定会员等级。
        alias: [成长值, 会员成长值]
        sync: false

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: member_point_ledger
    role: fact
    description: 积分流水表，记录积分发放、扣减和余额变动记录，每次积分变动产生一条记录。
    columns:
      - name: id
        role: primary_key
        description: 积分流水主键ID。
        alias: [积分流水ID]
        sync: false

      - name: user_id
        role: foreign_key
        description: 用户ID，关联users.id。
        alias: [用户ID]
        sync: false

      - name: ledger_type_code
        role: dimension
        description: 流水类型，signup_bonus=注册奖励，order_earn=订单消费获积分，order_earn_revoke=退款撤销积分，point_redeem=积分抵扣，expire=积分过期，admin_adjust=管理员调整。
        alias: [积分流水类型, 积分变动类型, 流水类型]
        sync: true

      - name: points_delta
        role: measure
        description: 积分变动量，正数为增加，负数为扣减。
        alias: [积分变动, 积分增减, 积分变化量]
        sync: false

      - name: balance_after
        role: measure
        description: 变动后积分余额。
        alias: [变动后余额, 积分余额, 余额]
        sync: false

      - name: created_at
        role: dimension
        description: 流水发生时间。
        alias: [积分变动时间, 流水时间, 发生时间]
        sync: false


  # ==========================================================
  # 酒店域
  # ==========================================================

  - name: hotels
    role: dim
    description: 酒店主表，存储酒店基础信息、星级、类型、设施和地区信息，用于按酒店维度统计订单数据。
    columns:
      - name: id
        role: primary_key
        description: 酒店主键ID。
        alias: [酒店ID]
        sync: false

      - name: hotel_code
        role: dimension
        description: 酒店编码，业务唯一标识。
        alias: [酒店编码]
        sync: false

      - name: hotel_name
        role: dimension
        description: 酒店名称。
        alias: [酒店名称, 酒店, 酒店名, 住宿]
        sync: true

      - name: hotel_type_code
        role: dimension
        description: 酒店类型，luxury=豪华型，business=商务型，resort=度假型，boutique=精品型。
        alias: [酒店类型, 酒店类别]
        sync: true

      - name: star_rating_code
        role: dimension
        description: 星级，3=三星，4=四星，5=五星。
        alias: [星级, 酒店星级, 酒店等级]
        sync: true

      - name: area_id
        role: foreign_key
        description: 所属城市地区ID，关联areas.id（城市级）。
        alias: [所在城市ID, 酒店地区ID, 酒店城市]
        sync: false

      - name: address
        role: dimension
        description: 酒店地址。
        alias: [地址, 酒店地址]
        sync: false

      - name: latitude
        role: dimension
        description: 纬度坐标。
        alias: [纬度]
        sync: false

      - name: longitude
        role: dimension
        description: 经度坐标。
        alias: [经度]
        sync: false

      - name: summary
        role: dimension
        description: 酒店简介。
        alias: [简介, 酒店简介, 描述]
        sync: false

      - name: facility_payload
        role: dimension
        description: 设施标签，JSON数组，如["wifi","parking","breakfast","gym"]。
        alias: [设施, 酒店设施, 配套设施]
        sync: false

      - name: check_in_time
        role: dimension
        description: 最早入住时间。
        alias: [入住时间, 最早入住, checkin时间]
        sync: false

      - name: check_out_time
        role: dimension
        description: 最晚退房时间。
        alias: [退房时间, 最晚退房, checkout时间]
        sync: false

      - name: contact_phone
        role: dimension
        description: 联系电话。
        alias: [酒店电话, 联系电话]
        sync: false

      - name: supplier_id
        role: foreign_key
        description: 供应商ID，关联suppliers.id（supplier_type_code=hotel）。
        alias: [供应商ID, 酒店供应商]
        sync: false

      - name: status_code
        role: dimension
        description: 状态编码，active=有效，inactive=无效。
        alias: [酒店状态]
        sync: true

      - name: created_at
        role: dimension
        description: 创建时间。
        alias: [创建时间]
        sync: false

      - name: updated_at
        role: dimension
        description: 更新时间。
        alias: [更新时间]
        sync: false


  - name: hotel_room_types
    role: dim
    description: 酒店房型表，维护每家酒店下的可售房型定义，包含房型名称、面积、床型、可住人数等信息。
    columns:
      - name: id
        role: primary_key
        description: 房型主键ID。
        alias: [房型ID]
        sync: false

      - name: hotel_id
        role: foreign_key
        description: 所属酒店ID，关联hotels.id。
        alias: [酒店ID, 所属酒店]
        sync: false

      - name: room_type_code
        role: dimension
        description: 房型编码，业务唯一标识，格式如HOTEL000001_DBL_01。
        alias: [房型编码]
        sync: false

      - name: room_type_name
        role: dimension
        description: 房型名称，大床房/双床房/套房/家庭房。
        alias: [房型名称, 房型, 房间类型]
        sync: true

      - name: room_type_category_code
        role: dimension
        description: 房型分类，double=大床房，twin=双床房，suite=套房，family=家庭房。
        alias: [房型分类, 房型类别]
        sync: true

      - name: area_size
        role: measure
        description: 房间面积（平方米）。
        alias: [面积, 房间面积, 平米]
